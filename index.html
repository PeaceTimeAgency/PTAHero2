<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Peace Time Agency \u2014 Broadcasting Harmony Across the Timeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #0D1B2A;
  --purple: #0e0c1f;
  --orange: #F26419;
  --pink: #F00699;
  --white: #E8EDF5;
  --dim: #6A7D94;
  --glow-o: rgba(242,100,25,0.4);
  --glow-p: rgba(240,6,153,0.4);
  --glass: rgba(13,27,42,0.5);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}

body {
  font-family:'Lexend',sans-serif;
  background:#080d14;
  color:var(--white);
  overflow-x:hidden;
  cursor:none;
}

/* CUSTOM CURSOR */
#cursor {
  position:fixed;
  width:12px;height:12px;
  border-radius:50%;
  background:var(--orange);
  pointer-events:none;
  z-index:99999;
  transform:translate(-50%,-50%);
  transition:transform 0.08s,width 0.2s,height 0.2s,background 0.2s;
  box-shadow:0 0 20px var(--orange),0 0 40px rgba(242,100,25,0.3);
  mix-blend-mode:screen;
}
#cursor-ring {
  position:fixed;
  width:36px;height:36px;
  border-radius:50%;
  border:1px solid rgba(242,100,25,0.5);
  pointer-events:none;
  z-index:99998;
  transform:translate(-50%,-50%);
  transition:transform 0.18s ease,width 0.3s,height 0.3s,border-color 0.3s;
}
body:has(a:hover) #cursor,
body:has(button:hover) #cursor { width:20px;height:20px;background:var(--pink); }
body:has(a:hover) #cursor-ring,
body:has(button:hover) #cursor-ring { width:56px;height:56px;border-color:var(--pink); }

/* PROGRESS BAR */
#progress-bar {
  position:fixed;
  top:0;left:0;
  height:2px;
  background:linear-gradient(90deg,var(--orange),var(--pink));
  z-index:10000;
  width:0%;
  transition:width 0.1s;
  box-shadow:0 0 10px var(--orange);
}

/* GRAIN */
body::after {
  content:'';
  position:fixed;inset:0;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events:none;z-index:9998;opacity:0.6;
}

/* BG CANVAS */
#bg-canvas {
  position:fixed;inset:0;
  z-index:0;pointer-events:none;
}

/* GRID */
.grid-bg {
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background-image:
    linear-gradient(rgba(122,139,160,0.045) 1px,transparent 1px),
    linear-gradient(90deg,rgba(122,139,160,0.045) 1px,transparent 1px);
  background-size:72px 72px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%,black 40%,transparent 100%);
}

/* BLOBS */
.blob {
  position:fixed;
  border-radius:50%;
  filter:blur(120px);
  opacity:0.12;
  pointer-events:none;
  z-index:1;
  animation:blob-drift ease-in-out infinite alternate;
}
.blob-1{width:600px;height:600px;background:var(--orange);top:-200px;left:-100px;animation-duration:18s;}
.blob-2{width:500px;height:500px;background:var(--pink);bottom:-150px;right:-100px;animation-duration:22s;animation-delay:-8s;}
.blob-3{width:400px;height:400px;background:#3d0b6b;top:40%;left:50%;transform:translate(-50%,-50%);animation-duration:15s;animation-delay:-4s;}
@keyframes blob-drift{from{transform:translate(0,0) scale(1)}to{transform:translate(40px,30px) scale(1.08)}}

/* NAV */
nav {
  position:fixed;top:20px;left:50%;
  transform:translateX(-50%);
  z-index:1000;
  width:calc(100% - 48px);max-width:1280px;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 24px;
  background:rgba(8,13,20,0.6);
  border:1px solid rgba(242,100,25,0.15);
  border-radius:100px;
  backdrop-filter:blur(28px) saturate(200%);
  box-shadow:0 0 0 1px rgba(255,255,255,0.03),0 8px 40px rgba(0,0,0,0.4);
  transition:background 0.4s,box-shadow 0.4s;
}
nav.scrolled{background:rgba(8,13,20,0.92);box-shadow:0 0 40px rgba(242,100,25,0.08),0 8px 40px rgba(0,0,0,0.6);}

.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.nav-peace-icon {
  width:36px;height:36px;border-radius:50%;
  display:flex;align-items:center;justify-content:center;
  position:relative;overflow:hidden;
  border:1.5px solid rgba(242,100,25,0.5);
  box-shadow:0 0 20px rgba(242,100,25,0.25);
}
.nav-peace-icon::before {
  content:'';position:absolute;inset:0;
  background:conic-gradient(from 0deg,var(--orange),var(--pink),var(--orange));
  opacity:0.15;animation:spin-bg 6s linear infinite;
}
@keyframes spin-bg{to{transform:rotate(360deg)}}
.nav-peace-icon svg{position:relative;z-index:1;}

.nav-wordmark {
  font-size:12px;font-weight:800;letter-spacing:0.14em;text-transform:uppercase;
}
.nav-wordmark em{color:var(--orange);font-style:normal;}

.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a {
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:500;letter-spacing:0.12em;text-transform:uppercase;
  color:var(--dim);text-decoration:none;
  position:relative;transition:color 0.25s;
}
.nav-links a::after {
  content:'';position:absolute;bottom:-4px;left:0;width:0;height:1px;
  background:var(--orange);transition:width 0.3s;
  box-shadow:0 0 6px var(--orange);
}
.nav-links a:hover{color:var(--white);}
.nav-links a:hover::after{width:100%;}

.nav-cta {
  font-family:'JetBrains Mono',monospace;
  font-size:10px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:#080d14;
  background:linear-gradient(135deg,var(--orange),#e8430a);
  padding:10px 24px;border-radius:100px;text-decoration:none;
  box-shadow:0 0 24px rgba(242,100,25,0.35);
  transition:all 0.3s;
  position:relative;overflow:hidden;
}
.nav-cta::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,var(--pink),#c0006e);
  opacity:0;transition:opacity 0.35s;
}
.nav-cta span{position:relative;z-index:1;}
.nav-cta:hover::before{opacity:1;}
.nav-cta:hover{color:#fff;box-shadow:0 0 32px rgba(240,6,153,0.4);}

/* HERO */
.hero {
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:140px 24px 100px;
  position:relative;z-index:10;overflow:hidden;
}

.hero-badge {
  display:inline-flex;align-items:center;gap:10px;
  padding:7px 18px;margin-bottom:40px;
  background:rgba(242,100,25,0.08);
  border:1px solid rgba(242,100,25,0.2);
  border-radius:100px;
  font-family:'JetBrains Mono',monospace;
  font-size:10px;letter-spacing:0.22em;text-transform:uppercase;
  color:var(--orange);
  opacity:0;animation:fade-up 0.8s 0.2s forwards;
  box-shadow:0 0 24px rgba(242,100,25,0.06);
}
.badge-dot{
  width:6px;height:6px;border-radius:50%;
  background:var(--pink);
  box-shadow:0 0 8px var(--pink);
  animation:blink 1.4s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* PEACE SIGN */
.peace-wrap {
  position:relative;width:320px;height:320px;
  margin:0 auto 52px;
  opacity:0;animation:fade-scale 1.2s 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards;
}

.orbital-ring {
  position:absolute;border-radius:50%;
  border:1px solid transparent;
  animation:orbit linear infinite;
}
.ring-a{inset:-28px;border-color:rgba(242,100,25,0.22);animation-duration:16s;box-shadow:inset 0 0 40px rgba(242,100,25,0.03);}
.ring-b{inset:-58px;border-color:rgba(240,6,153,0.15);animation-duration:26s;animation-direction:reverse;}
.ring-c{inset:-92px;border-color:rgba(242,100,25,0.08);animation-duration:42s;}
.ring-d{inset:-130px;border-color:rgba(240,6,153,0.05);animation-duration:60s;animation-direction:reverse;}

.ring-dot{
  position:absolute;top:-5px;left:50%;transform:translateX(-50%);
  border-radius:50%;
}
.ring-a .ring-dot{width:10px;height:10px;background:var(--orange);box-shadow:0 0 16px var(--orange),0 0 30px rgba(242,100,25,0.4);}
.ring-b .ring-dot{width:7px;height:7px;background:var(--pink);box-shadow:0 0 12px var(--pink);top:-3.5px;}
.ring-c .ring-dot{width:5px;height:5px;background:rgba(242,100,25,0.8);box-shadow:0 0 8px var(--orange);top:-2.5px;}
.ring-d .ring-dot{width:4px;height:4px;background:rgba(240,6,153,0.7);box-shadow:0 0 6px var(--pink);top:-2px;}

@keyframes orbit{to{transform:rotate(360deg)}}

.peace-disc {
  width:100%;height:100%;border-radius:50%;
  position:relative;
  display:flex;align-items:center;justify-content:center;
  background:radial-gradient(circle at 38% 32%,rgba(242,100,25,0.14) 0%,rgba(8,13,20,0.9) 65%);
  border:2px solid rgba(242,100,25,0.35);
  box-shadow:
    0 0 80px rgba(242,100,25,0.25),
    0 0 160px rgba(242,100,25,0.1),
    inset 0 0 80px rgba(242,100,25,0.06),
    inset 0 0 30px rgba(240,6,153,0.04);
  animation:disc-pulse 5s ease-in-out infinite;
}
@keyframes disc-pulse{
  0%,100%{box-shadow:0 0 80px rgba(242,100,25,0.25),0 0 160px rgba(242,100,25,0.1),inset 0 0 80px rgba(242,100,25,0.06);}
  50%{box-shadow:0 0 100px rgba(242,100,25,0.4),0 0 200px rgba(242,100,25,0.18),inset 0 0 100px rgba(242,100,25,0.1),0 0 60px rgba(240,6,153,0.1);}
}

.peace-svg-main{
  width:68%;height:68%;
  filter:drop-shadow(0 0 20px var(--orange)) drop-shadow(0 0 40px rgba(242,100,25,0.3));
  animation:peace-breathe 5s ease-in-out infinite;
}
@keyframes peace-breathe{
  0%,100%{filter:drop-shadow(0 0 20px var(--orange)) drop-shadow(0 0 40px rgba(242,100,25,0.3));}
  50%{filter:drop-shadow(0 0 30px var(--orange)) drop-shadow(0 0 60px rgba(242,100,25,0.5)) drop-shadow(0 0 80px rgba(240,6,153,0.2));}
}

/* HERO TEXT */
.hero-headline {
  font-size:clamp(2.8rem,6vw,5.6rem);
  font-weight:900;line-height:1.02;
  letter-spacing:-0.03em;
  margin-bottom:28px;
  opacity:0;animation:fade-up 1s 0.7s forwards;
}
.hl-orange{color:var(--orange);}
.hl-pink{color:var(--pink);}
.hl-outline{
  -webkit-text-stroke:1px rgba(242,100,25,0.5);
  color:transparent;
}

.hero-sub {
  font-size:1.05rem;font-weight:300;
  color:var(--dim);max-width:520px;
  margin:0 auto 52px;line-height:1.75;
  opacity:0;animation:fade-up 1s 0.9s forwards;
}

.hero-ctas {
  display:flex;gap:16px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fade-up 1s 1.1s forwards;
  margin-bottom:64px;
}

.btn-primary {
  position:relative;overflow:hidden;
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:700;letter-spacing:0.12em;text-transform:uppercase;
  color:#080d14;text-decoration:none;
  padding:16px 40px;border-radius:5px;
  background:linear-gradient(135deg,#ff7a2a,var(--orange),#d44000);
  border:none;cursor:none;
  box-shadow:0 0 40px rgba(242,100,25,0.3),inset 0 1px 0 rgba(255,255,255,0.2);
  transition:transform 0.3s,box-shadow 0.3s;
}
.btn-primary::before{
  content:'';position:absolute;top:0;left:-100%;
  width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.18),transparent);
  transition:left 0.5s;
}
.btn-primary:hover::before{left:100%;}
.btn-primary:hover{transform:translateY(-3px);box-shadow:0 0 60px rgba(242,100,25,0.5),0 12px 40px rgba(242,100,25,0.3);}

.btn-ghost {
  font-family:'JetBrains Mono',monospace;
  font-size:12px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--dim);text-decoration:none;
  padding:15px 36px;border-radius:5px;
  background:transparent;
  border:1px solid rgba(122,139,160,0.25);
  cursor:none;transition:all 0.3s;
  display:flex;align-items:center;gap:10px;
}
.btn-ghost:hover{
  border-color:var(--pink);color:var(--pink);
  box-shadow:0 0 24px rgba(240,6,153,0.2);
  background:rgba(240,6,153,0.04);
  transform:translateY(-3px);
}

/* HERO STATS ROW */
.hero-stats {
  display:flex;gap:48px;flex-wrap:wrap;justify-content:center;
  opacity:0;animation:fade-up 1s 1.3s forwards;
}
.h-stat{text-align:center;}
.h-stat-num {
  font-size:2rem;font-weight:900;letter-spacing:-0.04em;
  background:linear-gradient(135deg,var(--orange),#ffa040);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
}
.h-stat-num.pink-n{background:linear-gradient(135deg,var(--pink),#ff5fd6);-webkit-background-clip:text;background-clip:text;}
.h-stat-label{font-family:'JetBrains Mono',monospace;font-size:9px;letter-spacing:0.18em;text-transform:uppercase;color:var(--dim);margin-top:4px;}

/* TT FLOATERS */
.tt-floaters{position:absolute;inset:0;pointer-events:none;overflow:hidden;}
.tt-frame {
  position:absolute;border-radius:18px;
  border:1px solid rgba(242,100,25,0.18);
  background:rgba(8,13,20,0.75);
  backdrop-filter:blur(12px);
  overflow:hidden;
  box-shadow:0 8px 40px rgba(0,0,0,0.5),0 0 20px rgba(242,100,25,0.06);
  animation:tt-float ease-in-out infinite;
  transition:transform 0.1s;
}
.tf-a{width:100px;height:178px;left:4%;top:18%;animation-duration:8s;}
.tf-b{width:82px;height:146px;right:6%;top:22%;animation-duration:10s;
